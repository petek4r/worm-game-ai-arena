<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gemma Arcade: Worm Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="arcade-body">
<h1 class="arcade-title">GEMMA WORM</h1>
<div class="score-display" id="scoreBoard">SCORE: 0</div>

<div id="gameContainer">
    <canvas id="gameCanvas" width="400" height="400"></canvas>
</div>

<div class="controls">
    <button id="restartBtn">RESTART</button>
</div>

<div id="highScoresContainer">
    <h3>TOP SCORES</h3>
    <div id="highScoresList"></div>
</div>
</body>
<script src="script.js"></script>
</html>
