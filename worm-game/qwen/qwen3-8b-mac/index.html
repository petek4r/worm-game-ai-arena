<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Qwen Worm Game</title>
    <link rel="stylesheet" href="style.css">
    <script>
        // Define the status object
        window.ARENA_STATUS = {
            model: "Qwen 3 8B",
            environment: "Mac (M4 Max)",
            tier: "FAILURE",
            timeTaken: "> 60min",
            date: "2026-04-05"
        };
    </script>
    <script src="../../shared/status.js"></script>
    <script src="../../shared/sound.js"></script>
</head>
<body>
<div id="game-container">
    <div id="game-over">
        <h2>Game Over</h2>
        <p>Your score: <span id="final-score">0</span></p>
        <button onclick="restartGame()">Play Again</button>
    </div>
    <div id="start-screen">
        <h2>Snake Game</h2>
        <p>Use Arrow keys or WASD to control the worm</p>
        <button onclick="startGame()">Start Game</button>
    </div>
    <canvas id="game-canvas"></canvas>
</div>
<script src="script.js"></script>
</body>
</html>
