<!
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Worm Game</title>
    <link rel="stylesheet" href="style.css">
    <script src="../../shared/sound.js"></script>
    <script>
        window.ARENA_STATUS = {
            tier: "TIER_2",
            model: "Gemma 4 E26B",
            environment: "Mac (M4 Max)",
            timeTaken: "~30 mins "
        };
    </script>
    <script src="../../shared/status.js"></script>
</head>
<body>
    <div id="game-container">
        <div id="score-board">
            Score: <span id="current-score">0</span> | High Score: <span id="high-score">0</span>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="overlay" class="hidden">
            <h1 id="overlay-text">GAME OVER</h1>
            <button id="restart-btn">PLAY AGAIN</button>
        </div>
        <div id="top-scores-container" class="hidden">
            <h2 class="retro-title">TOP 5 SCORES</h2>
            <table id="high-scores-table">
                <thead>
                    <tr>
                        <th>Score</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="high-scores-body"></tbody>
            </table>
        </div>
        <div id="scanlines"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
