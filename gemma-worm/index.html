<!DOCTYPE html>
<html>
<head>
    <title>Gemma Worm Game</title>
    <style>
        body {
            background-color: #e8f5e9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        canvas {
            background-color: #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            border-radius: 5px;
        }
        h1 {
            color: #2e7d32;
        }
        // ... existing code ...
           .score {
               font-size: 24px;
               margin-bottom: 10px;
               color: #333;
           }
        .controls {
            margin-top: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #2e7d32;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #1b5e20;
        }
        #highScores {
            margin-top: 20px;
            width: 300px;
            text-align: left;
        }
        .high-score-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #ccc;
            padding: 5px 0;
        }
    </style>
</head>
<body>
<h1>Gemma Worm Game</h1>
<div class="score" id="scoreBoard">Score: 0</div>
<canvas id="gameCanvas" width="400" height="400"></canvas>

<div class="controls">
    <button id="restartBtn">Restart Game</button>
</div>

<div id="highScores">
    <h3>Top Scores</h3>
    <div id="highScoresList"></div>
</div>

<script src="script.js"></script>
</body>
</html>
