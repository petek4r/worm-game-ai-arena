<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worm Game - Qwen3-5-9b-mac</title>
    <script>
        window.ARENA_STATUS = {
            model: "Qwen3-5-9b",
            environment: "Mac (M4 Max)",
            tier: "TIER_2",
            timeTaken: "~20 mins",
            date: "2026-04-06"
        };
    </script>
    <script src="../../shared/sound.js"></script>
    <script src="../../shared/status.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>🐛 Retro Worm</h1>
            <div class="score-display">
                <div class="score-box">
                    <span class="label">Score:</span>
                    <span id="score" class="value">0</span>
                </div>
                <div class="score-box">
                    <span class="label">High Score:</span>
                    <span id="high-score" class="value">0</span>
                </div>
            </div>
        </header>
        
        <div class="game-wrapper">
            <canvas id="gameCanvas" width="600" height="400"></canvas>
            <div id="start-screen" class="overlay">
                <h2>Ready to Play?</h2>
                <p>Use Arrow Keys or WASD to control the worm</p>
                <button id="start-btn" class="retro-button">START GAME</button>
            </div>
            <div id="game-over-screen" class="overlay" style="display: none;">
                <h2>Game Over!</h2>
                <p>Final Score: <span id="final-score">0</span></p>
                <p>High Score: <span id="final-high-score">0</span></p>
                <button id="restart-btn" class="retro-button">PLAY AGAIN</button>
            </div>
        </div>
        
        <div class="high-score-table">
            <h3>🏆 Top 5 High Scores</h3>
            <table id="score-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Score</th>
                        <th>Date</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody id="score-list"></tbody>
            </table>
        </div>
        
        <footer class="game-footer">
            <p>Use Arrow Keys or WASD to move • Pass through walls • Die on self-collision</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
